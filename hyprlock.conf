source = ~/.config/omarchy/current/theme/hyprlock.conf
 
# BACKGROUND
background {
    monitor =
    path = ~/.config/omarchy/themes/ayaka/backgrounds/b2.jpg
    blur_passes = 0
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

#background 2
background {
    monitor =
    path = ~/.config/omarchy/themes/ayaka/backgrounds/b3.png
    blur_passes = 0
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
    zindex = 1
}

# GENERAL
general {
    no_fade_in = false
    grace = 0
    disable_loading_bar = false
    ignore_empty_input = true
}

# Time
label {
    monitor =
    text = cmd[update:1000] echo "<span>$(date +"%I:%M")</span>"
    color = $color 0.7)
    font_size = 450
    font_family = steelfish outline regular
    position = 0, 200
    halign = center
    valign = center
}

# Day-Month-Date
label {
    monitor =
    text = cmd[update:1000] echo -e "$(date +"%A, %B %d")"
    color = $color 0.7)
    font_size = 80
    font_family = SF Pro Display Bold
    position = 0, 580
    halign = center
    valign = center
}

# Foreground
image {
    monitor =
    path = ~/.config/omarchy/themes/foreground/fg1.png
    size = 2400
    border_size = 0
    rounding = 0
    rotate = 0
    reload_time = 0
    reload_cmd = 
    position = 0, -550
    halign = center
    valign = center
    zindex = 2
}

# USER
label {
    monitor = eDP-1
    text =    $USER
    color = $color 0.80)
    font_size = 24
    font_family = SF Pro Display Bold
    position = 0, -780
    halign = center
    valign = center
    zindex = 3
}

# INPUT FIELD
input-field {
    monitor = eDP-1
    size = 450, 75
    outline_thickness = 6
    dots_size = 0.2 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.2 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    outer_color = $outer_color
    inner_color = $inner_color
    font_color = $font_color
    fade_on_empty = false
    font_family = SF Pro Display Bold
    placeholder_text = <i><span foreground="##ffffff99">Give me the password</span></i>
    hide_input = false
    position = 0, -850
    halign = center
    valign = center
    zindex = 3
}

# SYSTEM STATUS (Top Right)
label {
    monitor = eDP-1
    text = cmd[update:2000] echo " $(~/.config/hypr/scripts/input.sh)   $(~/.config/hypr/scripts/network.sh)   $(~/.config/hypr/scripts/sound.sh)        $(~/.config/hypr/scripts/battery.sh)        "
    color = rgba(255, 255, 255, 0.8)
    font_size = 18
    font_family = SF Pro Display Bold
    position = -22, -11
    halign = right
    valign = top
    zindex = 2
}

auth {
    fingerprint:enabled = false
}
